version: "3.9"

services:
  go-service:
    build:
      context: ./go-service
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/todos"]
      interval: 5s
      timeout: 3s
      retries: 5

  python-service:
    build:
      context: ./python-service
    ports:
      - "8000:8000"
    environment:
      - GO_SERVICE_URL=http://go-service:8080
    depends_on:
      go-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/todos')"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ./go-service
      dockerfile: Dockerfile.gateway
    ports:
      - "9000:9000"
    environment:
      - GO_BACKEND_URL=http://go-service:8080
      - PYTHON_BACKEND_URL=http://python-service:8000
    depends_on:
      go-service:
        condition: service_healthy
      python-service:
        condition: service_healthy
